<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>The Tortoise and the Hare Race</title>
        <link rel="stylesheet" href="style.css" />
        <script src="script.js" defer></script>
    </head>

    <body>
        <h1>The Tortoise 🐢 and the Hare 🐇</h1>
        <p class="description">
            Click “Start Race” and watch the animals race across the track!
        </p>

        <div class="controls">
            <button id="startBtn">Start Race</button>
        </div>

        <div class="track-wrapper">
            <div id="scoreboard">
                <strong>Tortoise:</strong>
                <span id="tortoiseScore">0</span> wins | <strong>Hare:</strong>
                <span id="hareScore">0</span> wins
            </div>

            <div id="message"></div>
            <div id="track" class="track"></div>
        </div>

        <!-- We will do the log if we have time -->
        <div id="log">
            <h2>Race log</h2>
            <!-- entries added here by JavaScript -->
        </div>
    </body>
</html>
